name: Feature Request
description: 新しい機能の提案
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どのような機能が必要ですか？
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 背景・動機
      description: なぜこの機能が必要ですか？
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 受け入れ条件
      description: この機能が完了したと判断する基準は何ですか？
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 備考
      description: その他の情報（任意）
    validations:
      required: false
